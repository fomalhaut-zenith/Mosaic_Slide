<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Mosaic Slide">
<link rel="apple-touch-icon" href="mosaic_slide_icon.png">
<title>Mosaic Slide</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Raleway:wght@200;300&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#ede8e2;display:flex;justify-content:center;align-items:flex-start;min-height:100vh;padding:1rem 0 2rem;}
.cw{display:flex;flex-direction:column;align-items:center;padding:1.25rem 1rem 2rem;gap:1rem;font-family:'Raleway',sans-serif;width:100%;max-width:440px;}
.logo-area{width:100%;max-width:340px;}
.logo-area canvas{display:block;width:100%;height:auto;}

.level-row{display:flex;gap:10px;align-items:center;justify-content:center;}
.level-btn{position:relative;overflow:hidden;border:none;border-radius:3px;padding:0;cursor:pointer;width:88px;height:40px;flex-shrink:0;box-shadow:inset 1px 1px 0 rgba(255,255,255,0.45),inset -1px -1px 0 rgba(0,0,0,0.18),0 2px 5px rgba(0,0,0,0.2);transition:filter 0.12s,transform 0.1s;opacity:0.72;}
.level-btn canvas{position:absolute;inset:0;width:88px;height:40px;pointer-events:none;display:block;}
.level-btn span{position:relative;z-index:2;font-family:'Cinzel',serif;font-weight:700;font-size:13px;letter-spacing:0.1em;color:rgba(0,0,0,0);text-shadow:1px 1px 1px rgba(255,255,255,0.45),-1px -1px 1px rgba(50,30,12,0.55);-webkit-text-stroke:0.9px rgba(68,46,24,0.62);display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.level-btn:hover{filter:brightness(1.1);opacity:1;}
.level-btn.active{opacity:1;box-shadow:inset 1px 1px 0 rgba(255,255,255,0.45),inset -1px -1px 0 rgba(0,0,0,0.18),0 0 6px 1px rgba(210,160,45,0.5),0 2px 5px rgba(0,0,0,0.22);}
.level-btn.active::after{content:'';position:absolute;inset:0;border-radius:3px;box-shadow:inset 0 0 0 2px rgba(240,195,80,0.95),inset 0 0 8px rgba(225,180,60,0.4);z-index:3;pointer-events:none;}

.header-row{display:flex;align-items:center;justify-content:flex-end;width:100%;max-width:340px;}
.help-btn{width:32px;height:32px;border-radius:3px;border:none;padding:0;cursor:pointer;overflow:hidden;flex-shrink:0;box-shadow:inset 1px 1px 0 rgba(255,255,255,0.45),inset -1px -1px 0 rgba(0,0,0,0.18),0 2px 4px rgba(0,0,0,0.22);transition:filter 0.12s,transform 0.1s;position:relative;}
.help-btn canvas{display:block;position:absolute;inset:0;width:32px;height:32px;pointer-events:none;}
.help-btn:hover{filter:brightness(1.1);}
.help-btn:active{transform:scale(0.94);}

.board-wrap{width:100%;display:flex;justify-content:center;}
.board{display:grid;padding:8px;border-radius:6px;background:#a89888;box-shadow:inset 0 1px 4px rgba(0,0,0,0.22),0 2px 10px rgba(0,0,0,0.14);}
.tile{border-radius:2px;cursor:default;position:relative;overflow:hidden;transition:transform 0.12s ease,filter 0.15s,box-shadow 0.15s;}
.tile canvas{position:absolute;inset:0;width:100%;height:100%;border-radius:2px;pointer-events:none;display:block;}
.tile-num{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Cinzel',serif;font-weight:700;line-height:1;pointer-events:none;z-index:4;color:rgba(0,0,0,0);}
.tile.locked{filter:brightness(0.82) saturate(0.7);}
.tile.movable{cursor:pointer;filter:brightness(1.12) saturate(1.1);overflow:visible;box-shadow:0 0 8px 2px rgba(210,160,45,0.55),0 0 18px 4px rgba(200,145,30,0.28),0 4px 10px rgba(0,0,0,0.28);z-index:2;}
.tile.movable::after{content:'';position:absolute;inset:0;border-radius:2px;box-shadow:inset 0 0 0 2px rgba(240,195,80,0.98),inset 0 0 10px rgba(225,180,60,0.45);z-index:5;pointer-events:none;}
.tile:hover.movable{transform:scale(0.96) translateY(-1px);}
.tile.empty{background:#8a7b6e;box-shadow:inset 0 2px 7px rgba(0,0,0,0.32);cursor:default;border-radius:2px;}

.info-row{display:flex;gap:2rem;font-family:'Cinzel',serif;font-weight:400;letter-spacing:0.08em;color:#888;}
.info-val{color:#333;font-weight:700;}
.win-msg{font-family:'Cinzel',serif;font-weight:400;letter-spacing:0.18em;color:transparent;min-height:1.2em;transition:color 0.4s;text-align:center;}
.win-msg.show{color:#666;}
.btn-row{display:flex;gap:12px;width:100%;max-width:340px;justify-content:center;}
.tile-btn{position:relative;overflow:hidden;border:none;border-radius:3px;padding:0;cursor:pointer;width:136px;height:50px;flex-shrink:0;box-shadow:inset 1px 1px 0 rgba(255,255,255,0.45),inset -1px -1px 0 rgba(0,0,0,0.18),0 2px 6px rgba(0,0,0,0.22);transition:filter 0.12s,transform 0.1s;}
.tile-btn canvas{position:absolute;inset:0;width:100%;height:100%;pointer-events:none;display:block;}
.tile-btn span{position:relative;z-index:2;font-family:'Cinzel',serif;font-weight:700;letter-spacing:0.12em;color:rgba(0,0,0,0);text-shadow:1px 1px 1px rgba(255,255,255,0.45),-1px -1px 1px rgba(50,30,12,0.55);-webkit-text-stroke:1px rgba(68,46,24,0.62);display:flex;align-items:center;justify-content:center;width:100%;height:100%;}
.tile-btn:hover{filter:brightness(1.1);}
.tile-btn:active{transform:scale(0.96);}

.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.4);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:#f5efe6;border:0.5px solid #c8b89a;border-radius:12px;padding:2rem 2rem 1.5rem;max-width:310px;width:90%;position:relative;}
.modal-section-title{font-family:'Cinzel',serif;font-weight:400;font-size:10px;letter-spacing:0.38em;color:#a08c72;text-transform:uppercase;margin:0 0 0.75rem;}
.modal-section-title.second{margin-top:1.25rem;}
.modal-body{font-family:'Raleway',sans-serif;font-weight:300;font-size:14px;line-height:1.85;color:#6b5a48;}
.modal-body ol{margin:0;padding-left:1.2em;}
.modal-body li{margin-bottom:0.4em;}
.modal-divider{border:none;border-top:0.5px solid #d8c8b0;margin:1.1rem 0;}
.modal-close{position:absolute;top:14px;right:14px;width:24px;height:24px;border-radius:50%;border:0.5px solid #c8b89a;background:transparent;color:#a08c72;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0;transition:background 0.12s;font-family:sans-serif;}
.modal-close:hover{background:#ede3d6;color:#5a4535;}
.modal-hint{font-family:'Cinzel',serif;font-weight:400;font-size:10px;letter-spacing:0.14em;color:#a08c72;text-align:center;}
</style>
</head>
<body>
<div class="cw" id="cw">
  <div class="logo-area"><canvas id="logo-c"></canvas></div>
  <div class="level-row">
    <button class="level-btn active" id="lvl-3" onclick="setLevel(3)"><span>3 × 3</span></button>
    <button class="level-btn" id="lvl-4" onclick="setLevel(4)"><span>4 × 4</span></button>
    <button class="level-btn" id="lvl-5" onclick="setLevel(5)"><span>5 × 5</span></button>
  </div>
  <div class="header-row">
    <button class="help-btn" id="help-btn" onclick="openModal()"></button>
  </div>
  <div class="board-wrap"><div class="board" id="board"></div></div>
  <div class="info-row" id="info-row">
    <span>Moves&nbsp;<span class="info-val" id="moves">0</span></span>
    <span>Time&nbsp;<span class="info-val" id="timer">0:00</span></span>
  </div>
  <div class="win-msg" id="winmsg"></div>
  <div class="btn-row">
    <button class="tile-btn" id="btn-shuffle" onclick="shuffle()"><span>Shuffle</span></button>
    <button class="tile-btn" id="btn-solve" onclick="resetBoard()"><span>Solve</span></button>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay" onclick="handleOverlayClick(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModal()">×</button>
    <p class="modal-section-title">How to play</p>
    <div class="modal-body"><ol>
      <li>明るいタイルをクリックして空きマスへ移動</li>
      <li>数字を左上から順に並べればクリア</li>
    </ol></div>
    <hr class="modal-divider">
    <p class="modal-section-title second">Tips</p>
    <div class="modal-body"><ol>
      <li>まず上段を左から順に固定する</li>
      <li>次に中段を固定していく</li>
      <li>最後の行は空きマスを回すように動かすと揃いやすい</li>
    </ol></div>
    <hr class="modal-divider">
    <p class="modal-hint">Shuffle で新しい配置 · Solve で解答表示</p>
  </div>
</div>

<script>
class Rng{constructor(s){this.s=s%2147483647||1;}next(){this.s=this.s*16807%2147483647;return(this.s-1)/2147483646;}int(a,b){return Math.floor(this.next()*(b-a+1))+a;}}
function hexRgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}
function lighten(hex,a){const[r,g,b]=hexRgb(hex);return`rgb(${Math.min(255,r+a*255)},${Math.min(255,g+a*255)},${Math.min(255,b+a*255)})`;}
function darken(hex,a){const[r,g,b]=hexRgb(hex);return`rgb(${Math.max(0,r-a*255)},${Math.max(0,g-a*255)},${Math.max(0,b-a*255)})`;}

let currentLevel=3;

function calcTileSize(n){
  const avail=Math.min(document.getElementById('cw').clientWidth-32,380);
  const padding=16,gapTotal=(n-1)*(n<=3?7:n<=4?5:4);
  return Math.floor((avail-padding-gapTotal)/n);
}
function getTileConfig(n){
  const ts=calcTileSize(n),gap=n<=3?7:n<=4?5:4;
  return{tileSize:ts,gap,fontSize:Math.max(12,Math.floor(ts*0.42)),strokeW:Math.max(0.7,ts*0.012)};
}

function drawMosaicSurface(canvas,w,h,palIdx,seed){
  canvas.width=w;canvas.height=h;canvas.style.width=w+'px';canvas.style.height=h+'px';
  const ctx=canvas.getContext('2d'),W=w,H=h;
  const PALS=[['#c8b8a5','#ddd0be','#b5a592'],['#b8ccbf','#cdddd4','#a5b8af'],['#c4baa8','#dad0bc','#b0a895']];
  const pal=PALS[palIdx%PALS.length],r=new Rng(seed);
  ctx.fillStyle=pal[0];ctx.fillRect(0,0,W,H);
  for(let i=0;i<4;i++){const gx=r.next()*W,gy=r.next()*H,rad=W*0.6+r.next()*W*0.3;const g=ctx.createRadialGradient(gx,gy,0,gx,gy,rad);const pick=r.next()>0.5?pal[1]:pal[2];const[rr,gg,bb]=hexRgb(pick);g.addColorStop(0,`rgba(${rr},${gg},${bb},${0.38+r.next()*0.2})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  for(let i=0;i<W*H*0.3;i++){const x=r.next()*W,y=r.next()*H,a=(r.next()-0.5)*0.07;ctx.fillStyle=a>0?`rgba(255,255,255,${a})`:`rgba(0,0,0,${-a})`;ctx.fillRect(x,y,1,1);}
  const bv=ctx.createLinearGradient(0,0,0,H);bv.addColorStop(0,'rgba(255,255,255,0.32)');bv.addColorStop(0.08,'rgba(255,255,255,0.06)');bv.addColorStop(0.92,'rgba(0,0,0,0.04)');bv.addColorStop(1,'rgba(0,0,0,0.22)');ctx.fillStyle=bv;ctx.fillRect(0,0,W,H);
}

function drawHelpBtn(){
  const btn=document.getElementById('help-btn');btn.innerHTML='';
  const cvs=document.createElement('canvas');
  drawMosaicSurface(cvs,32,32,2,555);btn.appendChild(cvs);
  const ctx=cvs.getContext('2d');ctx.font='bold 17px Cinzel,serif';ctx.textAlign='center';ctx.textBaseline='middle';
  ctx.shadowColor='rgba(255,255,255,0.5)';ctx.shadowOffsetX=1;ctx.shadowOffsetY=1;ctx.shadowBlur=1;ctx.strokeStyle='rgba(55,35,15,0.65)';ctx.lineWidth=1.4;ctx.strokeText('?',16,17);
  ctx.shadowColor='rgba(35,18,5,0.7)';ctx.shadowOffsetX=-1;ctx.shadowOffsetY=-1;ctx.shadowBlur=1;ctx.strokeText('?',16,17);
}

function drawLevelBtns(){
  [['lvl-3',0,301],['lvl-4',1,401],['lvl-5',2,501]].forEach(([id,pi,seed])=>{
    const btn=document.getElementById(id);const old=btn.querySelector('canvas');if(old)old.remove();
    const cvs=document.createElement('canvas');
    drawMosaicSurface(cvs,88,40,pi,seed);btn.insertBefore(cvs,btn.firstChild);
  });
}

function drawMainBtns(){
  [['btn-shuffle',0,101],['btn-solve',1,202]].forEach(([id,pi,seed])=>{
    const btn=document.getElementById(id);const old=btn.querySelector('canvas');if(old)old.remove();
    const cvs=document.createElement('canvas');
    drawMosaicSurface(cvs,136,50,pi,seed);btn.insertBefore(cvs,btn.firstChild);
  });
}

function drawLogo(){
  const canvas=document.getElementById('logo-c');
  const avail=Math.min(document.getElementById('cw').clientWidth-32,340);
  const W2=avail*2,H2=Math.round(avail*2*(180/640));
  canvas.width=W2;canvas.height=H2;
  canvas.style.width=avail+'px';canvas.style.height=Math.round(avail*(180/640))+'px';
  const ctx=canvas.getContext('2d'),W=W2,H=H2;
  const pal=['#d4c5b5','#c8ddd2','#d8ccbc','#e2d4c2','#cec8bc','#d2c8c0','#daccbe','#d0c8be','#bfb8ae','#c8c0b4'];
  const ts=Math.round(W/36),gap=Math.round(ts/8)||1;let ci=0;const rg=new Rng(7);
  for(let y=0;y<H;y+=ts+gap){for(let x=0;x<W;x+=ts+gap){
    const col=pal[ci%pal.length];ci++;
    ctx.save();ctx.beginPath();ctx.roundRect(x,y,ts,ts,2);ctx.clip();
    const grd=ctx.createRadialGradient(x+rg.next()*ts,y+rg.next()*ts,0,x+ts/2,y+ts/2,ts);
    grd.addColorStop(0,lighten(col,0.12));grd.addColorStop(1,darken(col,0.08));
    ctx.fillStyle=grd;ctx.fillRect(x,y,ts,ts);
    const bvt=ctx.createLinearGradient(x,y,x,y+ts);bvt.addColorStop(0,'rgba(255,255,255,0.28)');bvt.addColorStop(1,'rgba(0,0,0,0.18)');
    ctx.fillStyle=bvt;ctx.fillRect(x,y,ts,ts);ctx.restore();
  }}
  const band=ctx.createLinearGradient(0,H*0.1,0,H*0.9);band.addColorStop(0,'rgba(55,40,28,0)');band.addColorStop(0.15,'rgba(55,40,28,0.74)');band.addColorStop(0.85,'rgba(55,40,28,0.74)');band.addColorStop(1,'rgba(55,40,28,0)');ctx.fillStyle=band;ctx.fillRect(0,0,W,H);
  const fs=Math.round(H*0.38);
  ['MOSAIC','SLIDE'].forEach((w,i)=>{ctx.save();ctx.font=`bold ${fs}px Cinzel,serif`;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillStyle='rgba(245,238,228,0.96)';ctx.shadowColor='rgba(0,0,0,0.55)';ctx.shadowOffsetX=0;ctx.shadowOffsetY=2;ctx.shadowBlur=7;ctx.fillText(w,W/2,i===0?H*0.33:H*0.72);ctx.restore();});
}

function resizeInfoRow(){
  const avail=Math.min(document.getElementById('cw').clientWidth-32,380);
  const fs=Math.max(14,Math.round(avail*0.048));
  document.getElementById('info-row').style.fontSize=fs+'px';
  document.querySelectorAll('.info-val').forEach(el=>el.style.fontSize=Math.round(fs*1.25)+'px');
  document.querySelectorAll('.tile-btn span').forEach(el=>el.style.fontSize=Math.max(13,Math.round(avail*0.042))+'px');
}

const PALETTES=[['#d4c5b5','#e8ddd0','#c2b0a0'],['#c8ddd2','#ddeee6','#b0ccc0'],['#d8ccbc','#ecdfe0','#c0b0a0'],['#e2d4c2','#f0e4d0','#d0bfaa'],['#cec8bc','#e2ddd2','#b8b0a4'],['#d2c8c0','#e6ddd8','#beb0a8'],['#daccbe','#eee0d0','#c8b8a8'],['#d0c8be','#e4dcd6','#bcb0a8'],['#c4beb5','#d8d4ca','#b0a8a0'],['#cac2b4','#dedad0','#b8b0a4'],['#c0b8ae','#d4d0c8','#acaaa2'],['#c8c0b5','#dcd8ce','#b4b0a8']];
function hexToRgb2(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];}

function drawTile(canvas,pal,seed,size,fontSize,strokeW){
  const W=size,H=size;canvas.width=W;canvas.height=H;canvas.style.width=W+'px';canvas.style.height=H+'px';
  const ctx=canvas.getContext('2d'),r=new Rng(seed);
  ctx.fillStyle=pal[0];ctx.fillRect(0,0,W,H);
  for(let i=0;i<4;i++){const gx=r.next()*W,gy=r.next()*H,rad=20+r.next()*W*0.5;const g=ctx.createRadialGradient(gx,gy,0,gx,gy,rad);const pick=r.next()>0.5?pal[1]:pal[2];const[rr,gg,bb]=hexToRgb2(pick);g.addColorStop(0,`rgba(${rr},${gg},${bb},${0.3+r.next()*0.25})`);g.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
  const imgd=ctx.getImageData(0,0,W,H),d=imgd.data;
  for(let i=0;i<d.length;i+=4){const n=(r.next()-0.5)*24;d[i]=Math.max(0,Math.min(255,d[i]+n));d[i+1]=Math.max(0,Math.min(255,d[i+1]+n*0.9));d[i+2]=Math.max(0,Math.min(255,d[i+2]+n*0.8));}
  ctx.putImageData(imgd,0,0);
  const bv=ctx.createLinearGradient(0,0,0,H);bv.addColorStop(0,'rgba(255,255,255,0.3)');bv.addColorStop(0.1,'rgba(255,255,255,0.07)');bv.addColorStop(0.9,'rgba(0,0,0,0.05)');bv.addColorStop(1,'rgba(0,0,0,0.2)');ctx.fillStyle=bv;ctx.fillRect(0,0,W,H);
  const bh=ctx.createLinearGradient(0,0,W,0);bh.addColorStop(0,'rgba(255,255,255,0.18)');bh.addColorStop(0.08,'rgba(255,255,255,0.04)');bh.addColorStop(0.92,'rgba(0,0,0,0.02)');bh.addColorStop(1,'rgba(0,0,0,0.14)');ctx.fillStyle=bh;ctx.fillRect(0,0,W,H);
  if(W>=60){const nc=r.int(1,2);for(let c=0;c<nc;c++){let px=r.next()*W,py=r.next()*H;ctx.beginPath();ctx.moveTo(px,py);const segs=r.int(2,5);for(let s=0;s<segs;s++){px+=r.next()*10-5;py+=r.next()*8-3;px=Math.max(1,Math.min(W-1,px));py=Math.max(1,Math.min(H-1,py));ctx.lineTo(px,py);}ctx.strokeStyle='rgba(50,30,15,0.2)';ctx.lineWidth=0.4;ctx.stroke();}}
  const sh=ctx.createLinearGradient(0,0,W*0.55,H*0.55);sh.addColorStop(0,'rgba(255,255,255,0.16)');sh.addColorStop(0.5,'rgba(255,255,255,0.03)');sh.addColorStop(1,'rgba(0,0,0,0)');ctx.fillStyle=sh;ctx.fillRect(0,0,W,H);
}

let tiles=[],moves=0,timerVal=0,timerInterval=null,won=false,seeds=[];

function setLevel(n){
  currentLevel=n;
  [3,4,5].forEach(l=>document.getElementById('lvl-'+l).classList.toggle('active',l===n));
  shuffle();
}

function shuffle(){
  const n=currentLevel,total=n*n;
  won=false;moves=0;
  document.getElementById('moves').textContent='0';
  document.getElementById('winmsg').textContent='';document.getElementById('winmsg').classList.remove('show');
  clearInterval(timerInterval);timerVal=0;document.getElementById('timer').textContent='0:00';
  seeds=Array.from({length:total-1},()=>Math.floor(Math.random()*99998)+1);
  tiles=Array.from({length:total},(_,i)=>i);
  for(let i=0;i<500+n*100;i++){const emp=tiles.indexOf(total-1);const nb=getNeighbors(emp,n);const pk=nb[Math.floor(Math.random()*nb.length)];[tiles[emp],tiles[pk]]=[tiles[pk],tiles[emp]];}
  render();
  timerInterval=setInterval(()=>{timerVal++;const m=Math.floor(timerVal/60),s=timerVal%60;document.getElementById('timer').textContent=m+':'+String(s).padStart(2,'0');},1000);
}

function getNeighbors(i,n){const row=Math.floor(i/n),col=i%n,nb=[];if(row>0)nb.push(i-n);if(row<n-1)nb.push(i+n);if(col>0)nb.push(i-1);if(col<n-1)nb.push(i+1);return nb;}

function tryMove(i){
  if(won)return;const n=currentLevel,emp=tiles.indexOf(n*n-1);
  if(getNeighbors(emp,n).includes(i)){[tiles[emp],tiles[i]]=[tiles[i],tiles[emp]];moves++;document.getElementById('moves').textContent=moves;render();checkWin();}
}

function checkWin(){
  if(tiles.every((v,i)=>v===i)){won=true;clearInterval(timerInterval);document.getElementById('winmsg').textContent='Complete — '+moves+' moves';document.getElementById('winmsg').classList.add('show');}
}

function resetBoard(){
  const n=currentLevel,total=n*n;
  tiles=Array.from({length:total},(_,i)=>i);
  won=true;clearInterval(timerInterval);render();
  document.getElementById('winmsg').textContent='Solved';document.getElementById('winmsg').classList.add('show');
}

function render(){
  const n=currentLevel,cfg=getTileConfig(n),{tileSize,fontSize,gap,strokeW}=cfg,total=n*n;
  const board=document.getElementById('board');board.innerHTML='';
  board.style.gridTemplateColumns=`repeat(${n},${tileSize}px)`;
  board.style.gridTemplateRows=`repeat(${n},${tileSize}px)`;
  board.style.gap=gap+'px';
  document.getElementById('winmsg').style.fontSize=Math.max(13,tileSize*0.15)+'px';
  const emp=tiles.indexOf(total-1),mv=getNeighbors(emp,n);
  tiles.forEach((v,i)=>{
    const div=document.createElement('div');div.style.width=tileSize+'px';div.style.height=tileSize+'px';
    if(v===total-1){div.className='tile empty';}
    else{
      const isMovable=mv.includes(i);
      div.className='tile '+(isMovable?'movable':'locked');
      const cvs=document.createElement('canvas');div.appendChild(cvs);
      drawTile(cvs,PALETTES[v%PALETTES.length],seeds[v]||v+1,tileSize,fontSize,strokeW);
      const sp=document.createElement('span');sp.className='tile-num';
      sp.style.fontSize=fontSize+'px';
      sp.style.textShadow='1px 2px 2px rgba(255,255,255,0.5),-1px -1px 1px rgba(55,35,20,0.6),0 1px 4px rgba(55,35,20,0.3)';
      sp.style.webkitTextStroke=strokeW+'px rgba(85,60,40,0.5)';
      sp.textContent=v+1;div.appendChild(sp);
      if(isMovable) div.onclick=()=>tryMove(i);
    }
    board.appendChild(div);
  });
}

function openModal(){document.getElementById('modal-overlay').classList.add('open');}
function closeModal(){document.getElementById('modal-overlay').classList.remove('open');}
function handleOverlayClick(e){if(e.target===document.getElementById('modal-overlay'))closeModal();}

let resizeTimer;
window.addEventListener('resize',()=>{clearTimeout(resizeTimer);resizeTimer=setTimeout(()=>{drawLogo();drawLevelBtns();drawMainBtns();resizeInfoRow();render();},150);});

document.fonts.ready.then(()=>{
  drawLogo();drawHelpBtn();
  setTimeout(()=>{drawLevelBtns();drawMainBtns();resizeInfoRow();shuffle();},50);
});
</script>
</body>
